    - Numeric Functions: intrinsic-functions/numeric.md
    - String Functions: intrinsic-functions/string.md
    - Date and Time Functions: intrinsic-functions/date-time.md
    - Financial Functions: intrinsic-functions/financial.md
    - Numeric Conversion Functions: intrinsic-functions/numeric-conversion.md
    - Exception Handling Functions: intrinsic-functions/exception-handling.md
    - User-Defined Functions: intrinsic-functions/user-defined.md
  - Preprocessor:
    - copy-replace/copy.md
    - copy-replace/replace.md
  - Extensions:
    - Embedded SQL: extensions/embedded-sql.md
    - XML Processing: extensions/xml.md
    - JSON Processing: extensions/json.md
    - Conditional Compilation: extensions/conditional-compilation.md
    - Object-Oriented COBOL: extensions/oo-cobol.md
    - Inter-Language Interop: extensions/interop.md
    - Compiler Directives: extensions/compiler-directives.md
    - Vendor Extensions: extensions/vendor-extensions.md
  - Appendices:
    - Arithmetic Precision: appendices/arithmetic-precision.md
    - Collating Sequence: appendices/collating-sequence.md
    - File Status Codes: appendices/file-status-codes.md
    - Reserved Words: appendices/reserved-words.md
    - Best Practices: appendices/best-practices.md
    - Sample Programs: appendices/sample-programs.md
    - Glossary: appendices/glossary.md
    - Migration Guide: appendices/migration.md
    - Debugging Techniques: appendices/debugging.md
    - Terminology Mapping: appendices/terminology.md
