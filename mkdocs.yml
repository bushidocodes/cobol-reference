    - Dynamic Memory:
      - ALLOCATE and FREE: procedure-division/memory/allocate-free.md
    - Archaic Verbs (Removed):
      - EXAMINE: procedure-division/archaic/examine.md
      - ALTER: procedure-division/archaic/alter.md
      - ENTER: procedure-division/archaic/enter.md
      - NOTE: procedure-division/archaic/note.md
      - DEFINE: procedure-division/archaic/define.md
      - INCLUDE: procedure-division/archaic/include.md
      - Async I/O (HOLD, SEEK, PROCESS, SUSPEND): procedure-division/archaic/async-io.md
  - Intrinsic Functions:
