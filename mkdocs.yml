site_name: COBOL Reference
site_description: A comprehensive reference for the COBOL programming language

theme:
  name: material
  palette:
    scheme: slate
    primary: blue grey
  features:
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      separator: '[\s\-\.]+'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Standards: standards.md
  - Language:
    - language/index.md
    - Source Format: language/source-format.md
    - Character Set: language/character-set.md
    - Figurative Constants: language/figurative-constants.md
    - Scope Terminators: language/scope-terminators.md
    - Reference Modification: language/reference-modification.md
    - Name Qualification: language/qualification.md
    - Conditions: language/conditions.md
    - Conditional Phrases: language/conditional-phrases.md
    - Special Registers: language/special-registers.md
  - Identification Division:
    - identification-division/index.md
    - Program Attributes: identification-division/program-attributes.md
  - Environment Division:
    - environment-division/index.md
    - SPECIAL-NAMES: environment-division/special-names.md
    - SELECT: environment-division/select.md
  - Data Division:
    - data-division/index.md
    - Storage Sections: data-division/storage-sections.md
    - Level Numbers: data-division/level-numbers.md
    - FD Entry: data-division/fd-entry.md
    - SD Entry: data-division/sd-entry.md
    - PICTURE Clause: data-division/picture.md
    - USAGE Clause: data-division/usage.md
    - OCCURS Clause (Arrays): data-division/occurs.md
    - Condition Names: data-division/condition-names.md
    - REDEFINES Clause: data-division/redefines.md
    - VALUE Clause: data-division/value.md
    - Additional Clauses: data-division/data-clauses.md
    - User-Defined Types (TYPEDEF): data-division/typedef.md
    - RENAMES (Level 66): data-division/renames.md
    - LINAGE Clause: data-division/linage.md
    - Report Section: data-division/report-section.md
    - Screen Section: data-division/screen-section.md
  - Procedure Division:
    - procedure-division/index.md
    - Arithmetic:
      - ADD: procedure-division/arithmetic/add.md
      - SUBTRACT: procedure-division/arithmetic/subtract.md
      - MULTIPLY: procedure-division/arithmetic/multiply.md
      - DIVIDE: procedure-division/arithmetic/divide.md
      - COMPUTE: procedure-division/arithmetic/compute.md
    - Data Movement:
      - MOVE: procedure-division/data-movement/move.md
      - SET: procedure-division/data-movement/set.md
      - INITIALIZE: procedure-division/data-movement/initialize.md
      - CORRESPONDING: procedure-division/data-movement/corresponding.md
      - VALIDATE: procedure-division/data-movement/validate.md
    - Control Flow:
      - DECLARATIVES and USE: procedure-division/control-flow/declaratives.md
      - IF: procedure-division/control-flow/if.md
      - EVALUATE: procedure-division/control-flow/evaluate.md
      - PERFORM: procedure-division/control-flow/perform.md
      - GO TO: procedure-division/control-flow/go-to.md
      - STOP: procedure-division/control-flow/stop.md
      - EXIT: procedure-division/control-flow/exit.md
      - CONTINUE: procedure-division/control-flow/continue.md
      - NEXT SENTENCE: procedure-division/control-flow/next-sentence.md
      - GOBACK: procedure-division/control-flow/goback.md
      - RAISE and RESUME: procedure-division/control-flow/raise-resume.md
    - Table Handling:
      - SEARCH: procedure-division/data-movement/search.md
    - Input/Output:
